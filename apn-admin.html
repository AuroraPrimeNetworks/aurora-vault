<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>APN Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
:root{--gold:#C9A84C;--gold-dark:#9A7A2E;--deep:#04091E;--deep2:#080F28;--deep3:#0D1A3A;--text:#F0EDE6;--text-muted:#8A9BB0;--border:rgba(201,168,76,0.15);--card:rgba(8,15,40,0.9);--danger:#E05C5C;--success:#22c55e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Outfit",sans-serif;background:var(--deep);color:var(--text);min-height:100vh;}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 70% 50% at 50% 40%,rgba(201,168,76,0.08) 0%,transparent 70%);}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:44px;width:100%;max-width:400px;text-align:center;}
.login-card img{height:80px;width:auto;margin:0 auto 20px;display:block;}
.login-title{font-family:"Cormorant Garamond",serif;font-size:26px;font-weight:600;color:var(--gold);margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:28px;}
.fg{margin-bottom:14px;text-align:left;}
.fg label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;}
.fg input{width:100%;padding:12px 14px;background:var(--deep3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:"Outfit",sans-serif;}
.fg input:focus{border-color:var(--gold);}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#04091E;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;}
.login-error{color:var(--danger);font-size:13px;margin-top:10px;padding:10px;background:rgba(224,92,92,0.1);border-radius:8px;border:1px solid rgba(224,92,92,0.3);display:none;}
#app{display:none;min-height:100vh;}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:240px;background:var(--deep2);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;}
.sbl{padding:18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sbl img{height:36px;width:auto;}
.sbl-t{font-family:"Cormorant Garamond",serif;font-size:15px;color:var(--gold);font-weight:600;}
.sbl-s{font-size:9px;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;}
.snav{flex:1;padding:12px;overflow-y:auto;}
.ns{font-size:9px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;padding:8px 10px;margin-top:6px;}
.ni{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-muted);transition:all 0.2s;margin-bottom:2px;border-left:3px solid transparent;}
.ni:hover{background:rgba(201,168,76,0.08);color:var(--text);}
.ni.active{background:rgba(201,168,76,0.12);color:var(--gold);border-left-color:var(--gold);}
.sbot{padding:12px;border-top:1px solid var(--border);}
.btn-logout{width:100%;padding:9px;background:rgba(224,92,92,0.1);border:1px solid rgba(224,92,92,0.3);border-radius:8px;color:var(--danger);font-size:12px;cursor:pointer;}
.main{margin-left:240px;padding:28px;min-height:100vh;}
.pt{font-family:"Cormorant Garamond",serif;font-size:28px;font-weight:600;margin-bottom:4px;}
.ps{font-size:13px;color:var(--text-muted);margin-bottom:24px;}
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
.sc{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
.sv{font-family:"Cormorant Garamond",serif;font-size:28px;font-weight:700;color:var(--gold);}
.sl{font-size:12px;color:var(--text-muted);margin-top:4px;}
.tw{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.th{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.tt{font-family:"Cormorant Garamond",serif;font-size:18px;font-weight:600;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 16px;text-align:left;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02);}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04);}
tr:last-child td{border:none;}
.ox{overflow-x:auto;}
.btn{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text);font-family:"Outfit",sans-serif;}
.bp{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#04091E;border:none;}
.bd{background:rgba(224,92,92,0.1);color:var(--danger);border-color:rgba(224,92,92,0.3);}
.bs{background:rgba(34,197,94,0.1);color:var(--success);border-color:rgba(34,197,94,0.3);}
.bsm{padding:5px 10px;font-size:11px;}
.badge{display:inline-flex;padding:3px 8px;border-radius:100px;font-size:10px;font-weight:600;}
.bg-s{background:rgba(34,197,94,0.15);color:var(--success);border:1px solid rgba(34,197,94,0.3);}
.bg-d{background:rgba(224,92,92,0.15);color:var(--danger);border:1px solid rgba(224,92,92,0.3);}
.bg-g{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid var(--border);}
.bg-m{background:rgba(255,255,255,0.05);color:var(--text-muted);border:1px solid var(--border);}
.fw{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px;}
.fw .fg{margin-bottom:14px;}
.fw label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;}
.fw input,.fw textarea,.fw select{width:100%;padding:10px 14px;background:var(--deep3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;font-family:"Outfit",sans-serif;}
.fw input:focus,.fw textarea:focus,.fw select:focus{border-color:var(--gold);}
.fw textarea{resize:vertical;min-height:100px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mo{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.mo.open{display:flex;}
.mb{background:var(--deep2);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;position:relative;}
.mc{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:13px;}
.mt{font-family:"Cormorant Garamond",serif;font-size:22px;font-weight:600;margin-bottom:16px;}
.ma{display:flex;gap:10px;margin-top:16px;}
.toast{position:fixed;bottom:20px;right:20px;padding:12px 18px;background:var(--deep3);border:1px solid var(--border);border-radius:10px;font-size:13px;z-index:9999;transform:translateY(80px);opacity:0;transition:all 0.3s;}
.toast.show{transform:translateY(0);opacity:1;}
.empty{text-align:center;padding:40px;color:var(--text-muted);}
.bv{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#04091E;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:600;margin-bottom:12px;}
</style>
</head>

<script>
var db = null;
try { firebase.initializeApp({apiKey:'AIzaSyCBTNuOgalz4LFDa0213UgDMvKIjj5Cxco',authDomain:'mapsaa-piggy-bank.firebaseapp.com',projectId:'mapsaa-piggy-bank',storageBucket:'mapsaa-piggy-bank.firebasestorage.app',messagingSenderId:'551166980790',appId:'1:551166980790:web:73594a9094e5529ba6ec17'}); db=firebase.firestore(); } catch(e){}

var ADMIN_EMAIL = localStorage.getItem('apn_admin_email') || 'samueljuniorokuny@outlook.com';
var ADMIN_PASS = localStorage.getItem('apn_admin_pass') || 'APNAdmin2026';
var D = {blog:[],team:[],products:[],careers:[],announcements:[],stats:{groups:'1+',members:'20+',savings:'UGX 1M+',founded:'2026'}};

function doLogin() {
  var e=document.getElementById('loginEmail').value.trim().toLowerCase();
  var p=document.getElementById('loginPass').value;
  var err=document.getElementById('loginError');
  err.style.display='none';
  ADMIN_EMAIL=(localStorage.getItem('apn_admin_email')||'samueljuniorokuny@outlook.com').toLowerCase();
  ADMIN_PASS=localStorage.getItem('apn_admin_pass')||'APNAdmin2026';
  if(!e||!p){err.textContent='Enter email and password.';err.style.display='block';return;}
  if(e===ADMIN_EMAIL&&p===ADMIN_PASS){
    document.getElementById('loginPage').style.display='none';
    document.getElementById('app').style.display='block';
    loadData();
  } else { err.textContent='Invalid credentials.'; err.style.display='block'; }
}

function doLogout(){document.getElementById('app').style.display='none';document.getElementById('loginPage').style.display='flex';}

async function loadData(){
  try{ if(db){var doc=await db.collection('apn_site').doc('content').get(); if(doc.exists) D=Object.assign(D,doc.data());} }catch(e){}
  nav('dashboard');
}
async function saveData(){try{if(db)await db.collection('apn_site').doc('content').set(D);}catch(e){}}

function nav(page){
  document.querySelectorAll('.ni').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.ni').forEach(function(el){if(el.getAttribute('onclick')&&el.getAttribute('onclick').includes("'"+page+"'"))el.classList.add('active');});
  var c=document.getElementById('content');
  if(page==='dashboard') c.innerHTML=rDashboard();
  else if(page==='blog') c.innerHTML=rBlog();
  else if(page==='announcements') c.innerHTML=rAnnouncements();
  else if(page==='team') c.innerHTML=rTeam();
  else if(page==='products') c.innerHTML=rProducts();
  else if(page==='careers') c.innerHTML=rCareers();
  else if(page==='stats') c.innerHTML=rStats();
  else if(page==='settings') c.innerHTML=rSettings();
}

function h(strings, ...vals) { return String.raw({raw:strings}, ...vals); }

function rDashboard(){
  var blog=D.blog||[], team=D.team||[], careers=D.careers||[], anns=D.announcements||[];
  var active=anns.filter(function(a){return a.active;});
  var openJobs=careers.filter(function(j){return j.open;});
  var html='<div class="pt">Dashboard</div><div class="ps">APN Content Overview</div>';
  html+='<div class="sg">';
  html+='<div class="sc"><div class="sv">'+blog.length+'</div><div class="sl">Blog Posts</div></div>';
  html+='<div class="sc"><div class="sv">'+team.length+'</div><div class="sl">Team Members</div></div>';
  html+='<div class="sc"><div class="sv">'+openJobs.length+'</div><div class="sl">Open Positions</div></div>';
  html+='<div class="sc"><div class="sv">'+active.length+'</div><div class="sl">Active Banners</div></div>';
  html+='</div>';
  if(active.length) html+='<div class="bv">📢 Active Banner: '+active[0].text+'</div>';
  html+='<div class="tw"><div class="th"><div class="tt">Recent Blog Posts</div><button class="btn bp bsm" onclick=\"nav(\'blog\')\">Manage →</button></div>';
  html+='<div class="ox"><table><thead><tr><th>Title</th><th>Category</th><th>Author</th><th>Date</th><th>Status</th></tr></thead><tbody>';
  if(blog.length){
    blog.slice(0,5).forEach(function(p){
      html+='<tr><td><strong>'+p.title+'</strong></td><td>'+p.category+'</td><td>'+p.author+'</td><td>'+p.date+'</td>';
      html+='<td><span class="badge '+(p.published?'bg-s':'bg-m')+'">'+(p.published?'Published':'Draft')+'</span></td></tr>';
    });
  } else html+='<tr><td colspan="5"><div class="empty">📰 No blog posts yet</div></td></tr>';
  html+='</tbody></table></div></div>';
  html+='<div class="tw"><div class="th"><div class="tt">Open Positions</div><button class="btn bp bsm" onclick=\"nav(\'careers\')\">Manage →</button></div>';
  html+='<table><thead><tr><th>Role</th><th>Type</th><th>Location</th><th>Status</th></tr></thead><tbody>';
  if(openJobs.length){
    openJobs.forEach(function(j){html+='<tr><td><strong>'+j.title+'</strong></td><td>'+j.type+'</td><td>'+j.location+'</td><td><span class="badge bg-s">Open</span></td></tr>';});
  } else html+='<tr><td colspan="4"><div class="empty">💼 No open positions</div></td></tr>';
  html+='</tbody></table></div>';
  return html;
}

function rBlog(){
  var posts=D.blog||[];
  var html='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;">';
  html+='<div><div class="pt">Blog Posts</div><div class="ps">'+posts.length+' posts</div></div>';
  html+='<button class="btn bp" onclick="showPost(-1)">+ New Post</button></div>';
  html+='<div class="tw"><div class="ox"><table><thead><tr><th>Post</th><th>Category</th><th>Author</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
  if(posts.length){
    posts.forEach(function(p,i){
      html+='<tr><td><strong>'+p.title+'</strong><div style="font-size:11px;color:var(--text-muted);">'+p.excerpt.substring(0,60)+'...</div></td>';
      html+='<td>'+p.category+'</td><td>'+p.author+'</td><td>'+p.date+'</td>';
      html+='<td><span class="badge '+(p.published?'bg-s':'bg-m')+'">'+(p.published?'Published':'Draft')+'</span></td>';
      html+='<td style="white-space:nowrap;"><button class="btn bsm" onclick="showPost('+i+')">✏️ Edit</button> <button class="btn bd bsm" onclick="delPost('+i+')">🗑️</button></td></tr>';
    });
  } else html+='<tr><td colspan="6"><div class="empty">📰 No posts yet. Create your first one!</div></td></tr>';
  html+='</tbody></table></div></div>';
  return html;
}

function showPost(idx){

function saveCreds(){var e=document.getElementById('seE').value.trim().toLowerCase();var p=document.getElementById('seP').value;var c=document.getElementById('seC').value;if(!e){showToast('Enter email');return;}if(p&&p!==c){showToast('Passwords do not match');return;}if(p&&p.length<8){showToast('Min 8 characters');return;}localStorage.setItem('apn_admin_email',e);if(p)localStorage.setItem('apn_admin_pass',p);showToast('✅ Credentials updated!');}

// Helpers
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function openMo(){document.getElementById('modal').classList.add('open');}
function closeMo(){document.getElementById('modal').classList.remove('open');}
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeMo();});
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
