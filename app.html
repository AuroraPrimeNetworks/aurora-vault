<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aurora Vault — Group App</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
:root {
  --gold: #C9A84C; --gold-light: #E8C96A; --gold-dark: #9A7A2E;
  --deep: #0D1B2A; --deep2: #112236; --deep3: #1a3a5c;
  --text: #F0EDE6; --text-muted: #8A9BB0;
  --border: rgba(201,168,76,0.15);
  --card-bg: rgba(17,34,54,0.8);
  --input-bg: rgba(13,27,42,0.9);
  --accent: #4ECDC4; --danger: #E05C5C; --success: #22c55e;
  --group-primary: #C9A84C;
  --group-name: 'Aurora Vault Group';
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--deep);color:var(--text);min-height:100vh;}

/* LOADING */
.loading-screen{position:fixed;inset:0;background:var(--deep);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.loading-logo{width:120px;height:auto;margin-bottom:24px;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.7;transform:scale(0.97);}}
.loading-text{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);margin-bottom:8px;}
.loading-sub{font-size:13px;color:var(--text-muted);}
.loading-bar{width:200px;height:3px;background:rgba(255,255,255,0.1);border-radius:3px;margin-top:24px;overflow:hidden;}
.loading-bar-inner{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-dark));border-radius:3px;animation:loading 2s ease-in-out infinite;}
@keyframes loading{0%{width:0%;}100%{width:100%;}}

/* LOGIN */
#loginPage{display:none;min-height:100vh;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(201,168,76,0.08) 0%,transparent 70%);}
.login-card{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:44px;width:100%;max-width:420px;backdrop-filter:blur(20px);}
.login-logo{text-align:center;margin-bottom:28px;}
.login-group-logo{width:80px;height:80px;border-radius:16px;object-fit:contain;margin:0 auto 12px;display:block;}
.login-group-name{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--group-primary);}
.login-group-sub{font-size:12px;color:var(--text-muted);margin-top:4px;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:6px;letter-spacing:0.5px;text-transform:uppercase;}
.form-group input{width:100%;padding:12px 16px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s;font-family:'DM Sans',sans-serif;}
.form-group input:focus{border-color:var(--gold);}
.btn-login{width:100%;padding:13px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0D1B2A;font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:all 0.3s;margin-top:8px;}
.btn-login:hover{box-shadow:0 8px 24px rgba(201,168,76,0.3);}
.login-error{color:var(--danger);font-size:13px;text-align:center;margin-top:10px;padding:10px;background:rgba(224,92,92,0.1);border-radius:8px;border:1px solid rgba(224,92,92,0.3);display:none;}
.login-footer{text-align:center;margin-top:24px;font-size:11px;color:var(--text-muted);}
.login-footer a{color:var(--gold);text-decoration:none;}

/* APP */
#app{display:none;}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:260px;background:linear-gradient(180deg,var(--deep2) 0%,var(--deep) 100%);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;transition:transform 0.3s;}
.sidebar-logo{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sidebar-logo img{width:40px;height:40px;border-radius:10px;object-fit:contain;}
.sidebar-logo-text{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--gold);line-height:1.2;}
.sidebar-logo-sub{font-size:10px;color:var(--text-muted);letter-spacing:1px;text-transform:uppercase;}
.sidebar-user{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.sidebar-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-weight:700;color:#0D1B2A;font-size:14px;flex-shrink:0;}
.sidebar-name{font-size:13px;font-weight:600;line-height:1.3;}
.sidebar-role{font-size:11px;color:var(--text-muted);}
.sidebar-nav{flex:1;padding:12px;overflow-y:auto;}
.nav-section{font-size:10px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;padding:8px 10px;margin-top:6px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;color:var(--text-muted);transition:all 0.2s;margin-bottom:2px;border-left:3px solid transparent;}
.nav-item:hover{background:rgba(201,168,76,0.08);color:var(--text);}
.nav-item.active{background:rgba(201,168,76,0.12);color:var(--gold);border-left-color:var(--gold);}
.nav-icon{font-size:18px;width:24px;text-align:center;}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;}
.sidebar-bottom{padding:14px;border-top:1px solid var(--border);}
.btn-logout{width:100%;padding:10px;background:rgba(224,92,92,0.1);border:1px solid rgba(224,92,92,0.3);border-radius:10px;color:var(--danger);font-size:13px;cursor:pointer;}
.sidebar-footer{text-align:center;font-size:10px;color:var(--text-muted);margin-top:10px;line-height:1.8;}
.sidebar-footer a{color:var(--gold);text-decoration:none;}

/* MAIN */
.main{margin-left:260px;padding:28px;min-height:100vh;}
.page-header{margin-bottom:28px;}
.page-title{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;}
.page-sub{font-size:13px;color:var(--text-muted);margin-top:4px;}

/* CARDS */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;}
.three-col{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:20px;}
.four-col{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px;}
.stat-card{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;padding:20px;backdrop-filter:blur(10px);}
.stat-val{font-family:'Playfair Display',serif;font-size:28px;font-weight:700;color:var(--gold);}
.stat-label{font-size:12px;color:var(--text-muted);margin-top:4px;}

/* TABLE */
.table-wrap{background:var(--card-bg);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:20px;backdrop-filter:blur(10px);}
.table-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.table-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;}
.overflow-x{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{padding:11px 18px;text-align:left;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02);}
td{padding:13px 18px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04);}
tr:last-child td{border:none;}
tr:hover td{background:rgba(201,168,76,0.03);}

/* PROFILE */
.profile-header{background:linear-gradient(135deg,var(--deep2),var(--deep3));border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.profile-avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:#0D1B2A;flex-shrink:0;}
.profile-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;}
.profile-meta{font-size:13px;color:var(--text-muted);margin-top:4px;}
.profile-share{margin-left:auto;text-align:right;}
.share-pct{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:var(--gold);}
.share-label{font-size:12px;color:var(--text-muted);}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:11px;font-weight:600;}
.badge-success{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.3);}
.badge-danger{background:rgba(224,92,92,0.15);color:var(--danger);border:1px solid rgba(224,92,92,0.3);}
.badge-gold{background:rgba(201,168,76,0.15);color:var(--gold);border:1px solid var(--border);}
.badge-muted{background:rgba(255,255,255,0.05);color:var(--text-muted);border:1px solid var(--border);}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text);transition:all 0.2s;font-family:'DM Sans',sans-serif;}
.btn:hover{background:rgba(255,255,255,0.05);}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:#0D1B2A;border:none;}
.btn-primary:hover{box-shadow:0 4px 16px rgba(201,168,76,0.3);}
.btn-danger{background:rgba(224,92,92,0.1);color:var(--danger);border-color:rgba(224,92,92,0.3);}
.btn-success{background:rgba(34,197,94,0.1);color:#22c55e;border-color:rgba(34,197,94,0.3);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-sm{padding:6px 12px;font-size:12px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--deep2);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;position:relative;}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:18px;}
.modal-close{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:14px;}
.input-group{margin-bottom:14px;}
.input-group label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.input-group input,.input-group select,.input-group textarea{width:100%;padding:10px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;transition:border-color 0.2s;font-family:'DM Sans',sans-serif;}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{border-color:var(--gold);}
.modal-actions{display:flex;gap:10px;margin-top:16px;}

/* PROGRESS BAR */
.progress-bar-bg{background:rgba(255,255,255,0.08);border-radius:6px;height:8px;}
.progress-bar{height:8px;border-radius:6px;transition:width 0.5s ease;}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;background:var(--deep2);border:1px solid var(--border);border-radius:10px;font-size:14px;z-index:9999;transform:translateY(80px);opacity:0;transition:all 0.3s;max-width:320px;}
.toast.show{transform:translateY(0);opacity:1;}

/* LOCKED PAGE */
.locked-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center;padding:40px;}
.locked-icon{font-size:64px;margin-bottom:16px;}
.locked-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--gold);margin-bottom:8px;}
.locked-sub{font-size:14px;color:var(--text-muted);max-width:300px;line-height:1.7;}

/* TIER CARD */
.tier-card{background:linear-gradient(135deg,var(--deep2),var(--deep3));border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px;}

/* ANNOUNCEMENTS */
.announcement-card{background:var(--card-bg);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;}
.announcement-title{font-weight:600;margin-bottom:6px;}
.announcement-meta{font-size:12px;color:var(--text-muted);}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;gap:12px;padding:16px;}
.chat-msg{max-width:75%;padding:12px 16px;border-radius:12px;font-size:13px;line-height:1.6;}
.chat-msg.sent{background:rgba(201,168,76,0.15);border:1px solid var(--border);margin-left:auto;border-radius:12px 12px 2px 12px;}
.chat-msg.received{background:var(--deep3);border:1px solid var(--border);margin-right:auto;border-radius:12px 12px 12px 2px;}
.chat-sender{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
.chat-input-wrap{padding:14px;border-top:1px solid var(--border);display:flex;gap:10px;}
.chat-input{flex:1;padding:10px 14px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:13px;outline:none;font-family:'DM Sans',sans-serif;}
.chat-input:focus{border-color:var(--gold);}

/* MOBILE */
.mobile-header{display:none;padding:14px 20px;background:var(--deep2);border-bottom:1px solid var(--border);position:fixed;top:0;left:0;right:0;z-index:40;align-items:center;justify-content:space-between;}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:40;}
@media(max-width:768px){
  .main{margin-left:0;padding:16px;padding-top:70px;}
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .mobile-header{display:flex;}
  .sidebar-overlay.open{display:block;}
  .two-col,.three-col,.four-col{grid-template-columns:1fr;}
}

/* SECTION TITLE */
.section-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;margin-bottom:14px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;}

/* SUSPENDED BANNER */
.suspended-banner{background:rgba(224,92,92,0.1);border:1px solid rgba(224,92,92,0.3);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;font-size:14px;}
</style>
</head>
<body>

<!-- LOADING SCREEN -->
<div class="loading-screen" id="loadingScreen">
  <div class="loading-text" id="loadingGroupName">Aurora Vault</div>
  <div class="loading-sub" id="loadingGroupSub">Loading your group...</div>
  <div class="loading-bar"><div class="loading-bar-inner"></div></div>
  <div style="position:absolute;bottom:20px;font-size:11px;color:var(--text-muted);">Powered by Aurora Prime Networks</div>
</div>

<!-- LOGIN PAGE -->
<div id="loginPage" style="display:none;min-height:100vh;align-items:center;justify-content:center;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(201,168,76,0.08) 0%,transparent 70%);">
  <div class="login-card">
    <div class="login-logo">
      <div id="loginGroupLogo" style="width:80px;height:80px;border-radius:16px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:32px;font-weight:700;color:#0D1B2A;margin:0 auto 12px;"></div>
      <div class="login-group-name" id="loginGroupName">Group Savings</div>
      <div class="login-group-sub" id="loginGroupSub">Powered by Aurora Vault</div>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="your@email.com" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="login-error" id="loginError">Invalid email or password.</div>
    <div class="login-footer">
      <div style="margin-bottom:6px;"><a href="#" onclick="showForgotPassword()">Forgot password?</a></div>
      Powered by <a href="https://auroravault.ug" target="_blank">Aurora Vault</a> &nbsp;|&nbsp; © 2026 APN Ltd.
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none;">

  <!-- Mobile Header -->
  <div class="mobile-header">
    <div style="font-family:'Playfair Display',serif;font-size:16px;color:var(--gold);" id="mobileGroupName">Aurora Vault</div>
    <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;">☰</button>
  </div>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div id="sidebarLogoImg" style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-weight:700;color:#0D1B2A;font-size:16px;flex-shrink:0;"></div>
      <div>
        <div class="sidebar-logo-text" id="sidebarGroupName">Group</div>
        <div class="sidebar-logo-sub">Aurora Vault</div>
      </div>
    </div>
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebarAvatar">AV</div>
      <div>
        <div class="sidebar-name" id="sidebarName">Member</div>
        <div class="sidebar-role" id="sidebarRole">Member</div>
      </div>
    </div>
    <div class="sidebar-nav" id="sidebarNav"></div>
    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="doLogout()">Sign Out</button>
      <div class="sidebar-footer">
        Powered by <a href="#">Aurora Vault</a><br>
        © 2026 APN Ltd. | v1.0
      </div>
    </div>
  </aside>

  <!-- CONTENT -->
  <div class="main">
    <div id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── FIREBASE ─────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyCBTNuOgalz4LFDa0213UgDMvKIjj5Cxco",
  authDomain: "mapsaa-piggy-bank.firebaseapp.com",
  projectId: "mapsaa-piggy-bank",
  storageBucket: "mapsaa-piggy-bank.firebasestorage.app",
  messagingSenderId: "551166980790",
  appId: "1:551166980790:web:73594a9094e5529ba6ec17"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MOMO_BACKEND = 'https://mapsaa-vault-production.up.railway.app';

// ── STATE ─────────────────────────────────────────────────────────────────────
var groupId = null;
var groupConfig = null;
var appData = null;
var currentUser = null;
var db_ref = null;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmt(n) { return 'UGX ' + (n||0).toLocaleString(); }
function initials(name) { return (name||'').split(' ').map(function(n){return n[0];}).slice(0,2).join('').toUpperCase(); }
function timeAgo(ts) {
  if (!ts) return '';
  var d = Date.now() - ts;
  if (d < 60000) return 'just now';
  if (d < 3600000) return Math.floor(d/60000) + 'm ago';
  if (d < 86400000) return Math.floor(d/3600000) + 'h ago';
  return new Date(ts).toLocaleDateString('en-UG',{day:'numeric',month:'short'});
}
function formatLastSeen(ts) {
  if (!ts) return 'Never';
  var d = Date.now()-ts;
  if (d<60000) return 'Just now';
  if (d<3600000) return Math.floor(d/60000)+'m ago';
  if (d<86400000) return Math.floor(d/3600000)+'h ago';
  return new Date(ts).toLocaleDateString('en-UG',{day:'numeric',month:'short',year:'numeric'});
}
function getMemberPoints(m) { return m.points || 0; }
function getMemberTotalSavings(m) { return Object.values(m.savings||{}).flat().reduce(function(a,b){return a+(b||0);},0); }
function memberTotal(m) { return getMemberTotalSavings(m); }
function groupTotal() { return appData.members.filter(function(m){return m.active;}).reduce(function(s,m){return s+memberTotal(m);},0); }
function memberShare(m) { var gt=groupTotal(); return gt>0?((memberTotal(m)/gt)*100).toFixed(1):0; }
function getMembershipMonths(m) {
  var start = (appData&&appData.activationDate) ? appData.activationDate : (m.joinDate||Date.now());
  return Math.floor((Date.now()-start)/(30*24*60*60*1000));
}
function getPointTier(m) {
  var pts = getMemberPoints(m);
  var tiers = (appData&&appData.loanSettings&&appData.loanSettings.tiers) ? appData.loanSettings.tiers : [
    {name:'Bronze',icon:'🥉',minPts:0,maxPts:400,rate:6,color:'#CD7F32',multiplier:2},
    {name:'Silver',icon:'🥈',minPts:401,maxPts:600,rate:5,color:'#A8B8C8',multiplier:2.5},
    {name:'Gold',icon:'🥇',minPts:601,maxPts:750,rate:4,color:'#FFD700',multiplier:3},
    {name:'Diamond',icon:'💎',minPts:751,maxPts:99999,rate:3,color:'#4ECDC4',multiplier:4}
  ];
  for (var i=tiers.length-1;i>=0;i--) { if (pts>=tiers[i].minPts) return tiers[i]; }
  return tiers[0];
}
function getLoanLimit(m) {
  var savings=getMemberTotalSavings(m), months=getMembershipMonths(m);
  var ls=(appData&&appData.loanSettings)?appData.loanSettings:{minMonths:3};
  var tier=getPointTier(m);
  if (months<(ls.minMonths||3)) return 0;
  return savings*(tier.multiplier||2);
}
function isFeatureEnabled(feature) {
  if (!groupConfig) return true;
  var flags = groupConfig.featureFlags || {};
  return flags[feature] !== false;
}
function isEditor() {
  return currentUser && (currentUser.role==='admin'||currentUser.role==='coadmin');

function isAdmin() {
  return currentUser && currentUser.role==='admin';
}

window.addEventListener('load', function() {

  var params = new URLSearchParams(window.location.search);

async function loadGroup() {
  try {
    // Load group config from aurora_groups collection
    var configDoc = await db.collection('aurora_groups').doc(groupId).get();
    if (configDoc.exists) {
      groupConfig = configDoc.data();
    } else {
      // Fallback - if it's MAPSAA use default config
      groupConfig = {
        id: groupId,
        name: groupId === 'mapsaa' ? 'MAPSAA Savings Group' : 'Aurora Vault Group',
        adminEmail: 'samueljuniorokuny@gmail.com',
        adminPassword: '@Samuel197502',
        memberPassword: 'mapsaa2026',
        color: '#C9A84C',
        logoInitials: groupId === 'mapsaa' ? 'MV' : 'AV',
        dataRef: groupId === 'mapsaa' ? 'appdata/main' : 'aurora_groups/' + groupId + '/data/main',
        featureFlags: { loans:true, points:true, momo:true, chat:true, reports:true, yearEndPayout:true, nin:false },
        tier: 'apartment',
        status: 'active'
      };
    }

    // Update loading screen
    document.getElementById('loadingGroupName').textContent = groupConfig.name;
    document.getElementById('loadingGroupSub').textContent = 'Loading your group...';
    document.title = groupConfig.name + ' — Aurora Vault';

    // Load app data
    var dataPath = groupConfig.dataRef || ('aurora_groups/' + groupId + '/data/main');
    var parts = dataPath.split('/');
    var dataDoc;
    if (parts.length === 2) {
      dataDoc = await db.collection(parts[0]).doc(parts[1]).get();
    } else if (parts.length === 4) {
      dataDoc = await db.collection(parts[0]).doc(parts[1]).collection(parts[2]).doc(parts[3]).get();
    }

    if (dataDoc && dataDoc.exists) {
      appData = dataDoc.data();
    } else {
      appData = getDefaultData();
    }

    migrateData();

    // Check for existing session
    var saved = sessionStorage.getItem('av_session_' + groupId);
    if (saved) {
      try {
        var sess = JSON.parse(saved);
        if (sess.role === 'admin') { currentUser = sess; hideLoading(); return; }
        if (sess.role === 'member') {
          var mem = appData.members.find(function(x){return x.id===sess.memberId&&x.active;});
          if (mem) { currentUser = sess; hideLoading(); return; }
        }
      } catch(e) { sessionStorage.removeItem('av_session_' + groupId); }
    }

    hideLoading();

  } catch(e) {
    console.error('Load error:', e);
    appData = getDefaultData();
    migrateData();
    hideLoading();
  }
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function doLogin() {
  var email = document.getElementById('loginEmail').value.trim().toLowerCase();
  var pass = document.getElementById('loginPass').value;
  var errEl = document.getElementById('loginError');
  errEl.style.display = 'none';

  if (!email || !pass) {
    errEl.textContent = 'Please enter your email and password.';
    errEl.style.display = 'block';
    return;
  }

  // Check admin
  if (email === groupConfig.adminEmail.toLowerCase() && pass === groupConfig.adminPassword) {
    var adminMember = appData.members.find(function(m){return m.email&&m.email.toLowerCase()===email;});
    currentUser = { role:'admin', email:email, memberId: adminMember ? adminMember.id : null };
    if (adminMember) { adminMember.lastLogin = Date.now(); saveData(); }
    sessionStorage.setItem('av_session_'+groupId, JSON.stringify(currentUser));
    document.getElementById('loginPage').style.display = 'none';
    showApp();
    return;
  }

  // Check co-admins
  var coAdmins = appData.coAdmins || [];
  for (var i=0;i<coAdmins.length;i++) {
    var ca = coAdmins[i];
    var cam = appData.members.find(function(x){return x.id===ca.memberId;});
    if (cam && cam.email && cam.email.toLowerCase()===email && cam.password===pass) {
      currentUser = { role:'coadmin', email:email, memberId:cam.id, accessLevel:ca.accessLevel };
      sessionStorage.setItem('av_session_'+groupId, JSON.stringify(currentUser));
      document.getElementById('loginPage').style.display = 'none';
      showApp();
      return;
    }
  }

  // Check members
  var member = appData.members.find(function(m){
    return m.active && m.email && m.email.toLowerCase()===email && m.password===pass;
  });
  if (member) {
    currentUser = { role:'member', email:email, memberId:member.id };
    member.lastLogin = Date.now();
    saveData();
    sessionStorage.setItem('av_session_'+groupId, JSON.stringify(currentUser));
    document.getElementById('loginPage').style.display = 'none';
    showApp();
    return;
  }

  errEl.textContent = 'Invalid email or password. Please try again.';
  errEl.style.display = 'block';
}

function doLogout() {
  sessionStorage.removeItem('av_session_'+groupId);
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('loginPage').style.display = 'flex';
}

// ── NAVIGATE ──────────────────────────────────────────────────────────────────
function navigateTo(page) {
  document.querySelectorAll('.nav-item').forEach(function(el){el.classList.remove('active');});
  document.querySelectorAll('.nav-item').forEach(function(el){
    if (el.getAttribute('onclick')&&el.getAttribute('onclick').includes("'"+page+"'")) el.classList.add('active');
  });
  var content = document.getElementById('content');
  switch(page) {
    case 'dashboard': content.innerHTML = renderAdminDashboard(); break;
    case 'members': content.innerHTML = renderMembers(); break;
    case 'savings': content.innerHTML = renderSavings(); break;
    case 'loans': content.innerHTML = isFeatureEnabled('loans') ? renderLoans() : renderLocked('Loans Disabled','This feature has been disabled for your group.', null); break;
    case 'adminPoints': content.innerHTML = isFeatureEnabled('points') ? renderAdminPoints() : renderLocked('Points Disabled','This feature has been disabled for your group.', null); break;
    case 'announcements': content.innerHTML = renderAnnouncements(); break;
    case 'adminChat': content.innerHTML = renderAdminChat(); break;
    case 'myDashboard': content.innerHTML = renderMemberDashboard(); break;
    case 'mySavings': content.innerHTML = renderMemberSavings(); break;
    case 'myLoans': content.innerHTML = (appData.featuresActivated&&isFeatureEnabled('loans')) ? renderMemberLoans() : renderLocked('Coming Soon','Loan features will be activated by the admin when your group is ready.',null); break;
    case 'myPoints': content.innerHTML = (appData.featuresActivated&&isFeatureEnabled('points')) ? renderMyPoints() : renderLocked('Coming Soon','Points and tiers will unlock when the admin activates the full system.',null); break;
    case 'myChat': content.innerHTML = isFeatureEnabled('chat') ? renderMemberChat() : renderLocked('Chat Disabled','Chat has been disabled for your group.',null); break;
    case 'settings': content.innerHTML = isAdmin() ? renderSettings() : renderLocked('Access Denied','Only the group admin can access settings.',null); break;
    default: content.innerHTML = renderAdminDashboard();
  }
  window.scrollTo(0,0);
  closeSidebar();
}

function renderLocked(title, msg, goTo) {
  return '<div class="locked-page"><div class="locked-icon">🔒</div><div class="locked-title">' + title + '</div><div class="locked-sub">' + msg + '</div>' +
    (goTo ? '<button class="btn btn-primary" style="margin-top:20px;" onclick="navigateTo(\'' + goTo + '\')">Go to Settings</button>' : '') + '</div>';
}

// ── MEMBER DASHBOARD ──────────────────────────────────────────────────────────
function renderMemberDashboard() {
  var m = appData.members.find(function(x){return x.id===currentUser.memberId;});
  if (!m) return '<div class="locked-page"><div class="locked-icon">⚠️</div><div class="locked-title">Profile Not Found</div></div>';

  // Personal stats
  var savings = memberTotal(m);
  var tier = getPointTier(m);
  var pts = getMemberPoints(m);
  var limit = getLoanLimit(m);
  var share = memberShare(m);
  var activeLoans = (m.loans||[]).filter(function(l){return l.status==='active'||l.status==='overdue';});

  // Group stats
  var activeMembers = appData.members.filter(function(x){return x.active;});
  var totalGroupSavings = groupTotal();
  var totalGroupLoans = activeMembers.reduce(function(s,x){
    return s + (x.loans||[]).filter(function(l){return l.status==='active'||l.status==='overdue';}).reduce(function(a,l){return a+(l.amount||0);},0);
  }, 0);
  var totalInterestEarned = activeMembers.reduce(function(s,x){
    return s + (x.loans||[]).filter(function(l){return l.status==='paid'||l.status==='active'||l.status==='overdue';}).reduce(function(a,l){
      return a + (l.amountPaid||0) - Math.max(0,(l.amountPaid||0) - ((l.amount||0)*(l.interestRate||0)/100)*( l.months||1));
    },0);
  }, 0);

  // Member interest earnings (proportional to their savings share)
  var myInterestShare = totalGroupSavings > 0 ? (savings / totalGroupSavings) * totalInterestEarned : 0;

  // Group savings goal (optional - from groupConfig)
  var savingsGoal = (groupConfig && groupConfig.savingsGoal) ? groupConfig.savingsGoal : 0;
  var goalProgress = savingsGoal > 0 ? Math.min(100, Math.floor((totalGroupSavings/savingsGoal)*100)) : 0;

  // Member contributions table
  // Members only see their own savings + group total (privacy)
  // Admins/co-admins see everyone's individual amounts
  var isAdminView = currentUser.role === 'admin' || currentUser.role === 'coadmin';
  var contribRows = activeMembers.slice().sort(function(a,b){return memberTotal(b)-memberTotal(a);}).map(function(x, i){
    var isMe = x.id === m.id;
    var xSavings = memberTotal(x);
    var xShare = memberShare(x);
    var barWidth = totalGroupSavings > 0 ? Math.max(2, Math.floor((xSavings/totalGroupSavings)*100)) : 0;

    // Non-admins only see amounts for themselves, others show as private
    var amountDisplay = (isAdminView || isMe) ?
      '<td style="color:var(--gold);font-weight:600;">' + fmt(xSavings) + '</td>' +
      '<td><div style="display:flex;align-items:center;gap:8px;"><div style="flex:1;background:rgba(255,255,255,0.06);border-radius:3px;height:6px;"><div style="width:'+barWidth+'%;background:var(--gold);height:6px;border-radius:3px;"></div></div><span style="font-size:12px;color:var(--text-muted);min-width:32px;">' + xShare + '%</span></div></td>' :
      '<td style="color:var(--text-muted);font-style:italic;">Private</td>' +
      '<td><div style="flex:1;background:rgba(255,255,255,0.06);border-radius:3px;height:6px;"><div style="width:4%;background:rgba(255,255,255,0.1);height:6px;border-radius:3px;"></div></div></td>';

    return '<tr style="' + (isMe?'background:rgba(201,168,76,0.06);':'') + '">' +
      '<td style="font-weight:' + (isMe?'700':'400') + ';"><div style="display:flex;align-items:center;gap:8px;">' +
      '<div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-dark));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#0D1B2A;flex-shrink:0;">' + initials(x.name) + '</div>' +
      x.name + (isMe?' <span style="font-size:10px;background:rgba(201,168,76,0.2);padding:1px 6px;border-radius:4px;color:var(--gold);">You</span>':'') +
      '</div></td>' + amountDisplay + '</tr>';
  }).join('');

  // Tier card
  var tierCard = appData.featuresActivated && isFeatureEnabled('points') ?
    '<div class="tier-card">' +
    '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;">' +
    '<div style="font-size:40px;">' + tier.icon + '</div>' +
    '<div><div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;">Points & Tier</div>' +
    '<div style="font-family:Playfair Display,serif;font-size:28px;font-weight:700;color:var(--gold);">' + pts + ' <span style="font-size:14px;color:' + tier.color + '">pts</span></div>' +
    '<div style="font-size:13px;color:' + tier.color + ';font-weight:600;">' + tier.name + ' — ' + tier.rate + '% interest/month</div></div>' +
    '<div style="margin-left:auto;text-align:right;"><div style="font-size:11px;color:var(--text-muted);">Max Loan</div>' +
    '<div style="font-family:Playfair Display,serif;font-size:20px;font-weight:700;color:var(--accent);">' + fmt(limit) + '</div></div></div></div>' :
    '<div class="tier-card" style="text-align:center;"><div style="font-size:48px;margin-bottom:8px;">🔒</div>' +
    '<div style="font-size:16px;font-weight:700;color:var(--gold);">Coming Soon</div>' +
    '<div style="font-size:13px;color:var(--text-muted);margin-top:6px;">Points & tiers will unlock when the admin activates the full system.</div></div>';

  // Announcements
  var anns = (appData.announcements||[]).slice(0,3);

  return '<div class="profile-header">' +
    '<div class="profile-avatar">' + initials(m.name) + '</div>' +
    '<div><div class="profile-name">' + m.name + '</div>' +
    '<div class="profile-meta">📱 ' + m.contact + ' · ✉️ ' + m.email + '</div>' +
    '<div style="margin-top:8px;"><span class="badge badge-success">Active Member</span></div></div>' +
    '<div class="profile-share"><div class="share-pct">' + share + '%</div><div class="share-label">Group Share</div></div></div>' +

    tierCard +

    '<!-- My Personal Stats -->' +
    '<div class="section-title" style="margin-bottom:12px;">My Stats</div>' +
    '<div class="four-col" style="margin-bottom:24px;">' +
    '<div class="stat-card"><div style="font-size:22px;margin-bottom:6px;">💰</div><div class="stat-val">' + fmt(savings) + '</div><div class="stat-label">My Total Savings</div></div>' +
    '<div class="stat-card"><div style="font-size:22px;margin-bottom:6px;">🏦</div><div class="stat-val">' + activeLoans.length + '</div><div class="stat-label">My Active Loans</div></div>' +
    (appData.featuresActivated && isFeatureEnabled('points') ?
    '<div class="stat-card"><div style="font-size:22px;margin-bottom:6px;">📈</div><div class="stat-val">' + fmt(Math.floor(myInterestShare)) + '</div><div class="stat-label">My Interest Earnings</div><div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Based on my ' + share + '% share</div></div>' : '<div class="stat-card"><div style="font-size:22px;margin-bottom:6px;">📈</div><div class="stat-val">—</div><div class="stat-label">My Interest Earnings</div></div>') +
    '<div class="stat-card"><div style="font-size:22px;margin-bottom:6px;">👥</div><div class="stat-val">' + activeMembers.length + '</div><div class="stat-label">Total Members</div></div>' +
    '</div>' +

    '<!-- Group Overview -->' +
    '<div class="section-title" style="margin-bottom:12px;">Group Overview</div>' +
    '<div class="four-col" style="margin-bottom:' + (savingsGoal>0?'16':'24') + 'px;">' +
    '<div class="stat-card"><div style="font-size:22px;margin-bottom:6px;">🏦</div><div class="stat-val">' + fmt(totalGroupSavings) + '</div><div class="stat-label">Total Group Savings</div></div>' +
    '<div class="stat-card"><div style="font-size:22px;margin-bottom:6px;">📋</div><div class="stat-val">' + fmt(totalGroupLoans) + '</div><div class="stat-label">Total Active Loans</div></div>' +
    '<div class="stat-card"><div style="font-size:22px;margin-bottom:6px;">💹</div><div class="stat-val">' + fmt(Math.floor(totalInterestEarned)) + '</div><div class="stat-label">Total Interest Earned</div></div>' +
    '<div class="stat-card"><div style="font-size:22px;margin-bottom:6px;">👤</div><div class="stat-val">' + activeMembers.length + '</div><div class="stat-label">Active Members</div></div>' +
    '</div>' +

    (savingsGoal > 0 ?
    '<div class="stat-card" style="margin-bottom:24px;">' +
    '<div style="display:flex;justify-content:space-between;margin-bottom:8px;"><span style="font-weight:600;">Group Savings Goal</span><span style="color:var(--gold);font-weight:700;">' + goalProgress + '%</span></div>' +
    '<div class="progress-bar-bg"><div class="progress-bar" style="width:' + goalProgress + '%;background:var(--gold);"></div></div>' +
    '<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--text-muted);"><span>' + fmt(totalGroupSavings) + ' saved</span><span>Goal: ' + fmt(savingsGoal) + '</span></div></div>' : '') +

    '<!-- Member Contributions -->' +
    '<div class="table-wrap" style="margin-bottom:24px;">' +
    '<div class="table-header"><div class="table-title">💰 Member Contributions</div></div>' +
    '<div class="overflow-x"><table><thead><tr><th>Member</th><th>Total Saved</th><th>Group Share</th></tr></thead>' +
    '<tbody>' + contribRows + '</tbody>' +
    '<tfoot><tr style="border-top:2px solid var(--border);"><td style="padding:12px 18px;font-weight:700;">Group Total</td>' +
    '<td style="padding:12px 18px;font-weight:700;color:var(--gold);">' + fmt(totalGroupSavings) + '</td><td></td></tr></tfoot>' +
    '</table></div></div>' +

    (anns.length ? '<div class="section-title" style="margin-bottom:12px;">📢 Latest Notices</div>' +
    anns.map(function(a){return '<div class="announcement-card"><div class="announcement-title">' + a.title + '</div><div style="font-size:13px;color:var(--text-muted);margin:6px 0;">' + (a.body||'') + '</div><div class="announcement-meta">' + timeAgo(a.ts) + '</div></div>';}).join('') : '');
}

// ── LOGO UPLOAD ──────────────────────────────────────────────────────────────
function previewLogo(input) {
  if (!input.files || !input.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var preview = document.getElementById('logoPreview');
    if (preview) preview.innerHTML = '<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:contain;"/>';
    groupConfig._pendingLogo = e.target.result;
  };
  reader.readAsDataURL(input.files[0]);
}

function removeLogo() {
  groupConfig.logoData = '';
  groupConfig._pendingLogo = '';
  var preview = document.getElementById('logoPreview');
  if (preview) preview.innerHTML = '🏢';
  showToast('Logo removed. Click Save Logo to apply.');
}

async function saveLogoSettings() {
  if (groupConfig._pendingLogo !== undefined) {
    groupConfig.logoData = groupConfig._pendingLogo;
    delete groupConfig._pendingLogo;
  }
  try {
    await db.collection('aurora_groups').doc(groupId).set(groupConfig, {merge:true});
  } catch(e) {}
  buildSidebar();
  showToast('✅ Logo saved!');
}

// ── FEATURE TOGGLE ─────────────────────────────────────────────────────────
function toggleFeature(feature, val) {
  if (feature === 'loans') appData.loansActivated = val;
  if (feature === 'points') appData.pointsActivated = val;
  saveData();
  buildSidebar();
  showToast((val ? '✅ ' : '🔒 ') + feature.charAt(0).toUpperCase() + feature.slice(1) + ' ' + (val?'activated':'deactivated') + '!');
}

// ── SAVE LOAN SETTINGS ─────────────────────────────────────────────────────
function saveLoanSettings() {
  if (!appData.loanSettings) appData.loanSettings = {};
  var ls = appData.loanSettings;
  var g = function(id) { var el=document.getElementById(id); return el?el.value:null; };
  ls.minMonths = parseInt(g('lsMinMonths'))||3;
  ls.minSavings = parseInt(g('lsMinSavings'))||50000;
  ls.maxDuration = parseInt(g('lsMaxDuration'))||6;
  ls.defaultRate = parseFloat(g('lsDefaultRate'))||10;
  ls.minLoan = parseInt(g('lsMinLoan'))||10000;
  ls.maxLoan = parseInt(g('lsMaxLoan'))||500000;
  ls.limitMethod = g('lsLimitMethod')||'multiplier';
  ls.multiplierBase = parseFloat(g('lsMultiplier'))||2;
  ls.graceDays = parseInt(g('lsGraceDays'))||7;
  ls.lateFee = parseFloat(g('lsLateFee'))||5;
  saveData();
  showToast('✅ Loan settings saved!');
}

// ── SAVE POINTS SETTINGS ────────────────────────────────────────────────────
function savePointsSettings() {
  if (!appData.loanSettings) appData.loanSettings = {};
  var ls = appData.loanSettings;
  var g = function(id) { var el=document.getElementById(id); return el?el.value:null; };
  ls.pointsPerMonth = parseInt(g('lsPointsPerMonth'))||10;
  ls.pointsDeductMiss = parseInt(g('lsPointsMiss'))||5;
  ls.welcomeBonus = parseInt(g('lsWelcomeBonus'))||100;
  saveData();
  showToast('✅ Points settings saved!');
}

// ── UPDATE LOAN TIER ────────────────────────────────────────────────────────
function updateLoanTier(el) {
  var idx = parseInt(el.dataset.tier);
  var field = el.dataset.field;
  if (!appData.loanSettings || !appData.loanSettings.tiers) return;
  appData.loanSettings.tiers[idx][field] = parseFloat(el.value);
  if (field === 'minPts' && idx > 0) appData.loanSettings.tiers[idx-1].maxPts = parseFloat(el.value)-1;
}

// ── SAVE DATA ─────────────────────────────────────────────────────────────────
async function saveData() {
  try {
    var dataPath = groupConfig.dataRef || ('aurora_groups/' + groupId + '/data/main');
    var parts = dataPath.split('/');
    if (parts.length === 2) {
      await db.collection(parts[0]).doc(parts[1]).set(appData);
    } else if (parts.length === 4) {
      await db.collection(parts[0]).doc(parts[1]).collection(parts[2]).doc(parts[3]).set(appData);
    }
  } catch(e) { console.error('Save error:', e); }
}

// ── MIGRATE DATA ──────────────────────────────────────────────────────────────
function migrateData() {
  if (!appData.chats) appData.chats = {};
  if (!appData.yearArchives) appData.yearArchives = [];
  if (!appData.loanRequests) appData.loanRequests = [];
  if (!appData.notifications) appData.notifications = {};
  if (!appData.pendingDeposits) appData.pendingDeposits = [];
  if (!appData.announcements) appData.announcements = [];
  if (appData.featuresActivated === undefined) appData.featuresActivated = false;
  if (!appData.activationDate) appData.activationDate = null;
  if (!appData.coAdmins) appData.coAdmins = [];
  if (!appData.loanSettings) appData.loanSettings = {
    minMonths:3, minSavings:60000, multiplierBase:2,
    pointsPerMonth:10, pointsDeductMiss:5, welcomeBonus:100,
    tiers:[
      {name:'Bronze',icon:'🥉',minPts:0,maxPts:400,rate:6,color:'#CD7F32',multiplier:2},
      {name:'Silver',icon:'🥈',minPts:401,maxPts:600,rate:5,color:'#A8B8C8',multiplier:2.5},
      {name:'Gold',icon:'🥇',minPts:601,maxPts:750,rate:4,color:'#FFD700',multiplier:3},
      {name:'Diamond',icon:'💎',minPts:751,maxPts:99999,rate:3,color:'#4ECDC4',multiplier:4}
    ]
  };
  if (!appData.members) appData.members = [];
  appData.members.forEach(function(m) {
    if (!m.savings) m.savings = {};
    MONTHS.forEach(function(mo){ if (!m.savings[mo]) m.savings[mo]=[0,0,0,0]; });
    if (!m.loans) m.loans = [];
    if (!m.pointHistory) m.pointHistory = [];
    if (m.welcomeBonusGiven===undefined) m.welcomeBonusGiven = false;
    if (!m.momoNumber) m.momoNumber = '';
    if (m.points===undefined) m.points = 0;
  });
}

function getDefaultData() {
  return {
    members:[], chats:{}, yearArchives:[], loanRequests:[],
    notifications:{}, pendingDeposits:[], announcements:[],
    featuresActivated:false, activationDate:null, coAdmins:[],
    nextLoanId:1, loanSettings:null
  };
}

// ── MODAL HELPERS ─────────────────────────────────────────────────────────────
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 3000);
}

// ── MOBILE SIDEBAR ────────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('open');
}

// ── NOTIFICATIONS ─────────────────────────────────────────────────────────────
function addNotification(memberId, title, body) {
  if (!appData.notifications) appData.notifications = {};
  if (!appData.notifications[memberId]) appData.notifications[memberId] = [];
  appData.notifications[memberId].unshift({ id: Date.now(), title:title, body:body, ts:Date.now(), read:false });
}

// ── ADD MEMBER ────────────────────────────────────────────────────────────────
function showAddMemberModal() {
  openModal('<div class="modal-title">+ Add Member</div>' +
    '<div class="input-group"><label>Full Name</label><input type="text" id="newName" placeholder="e.g. John Doe"/></div>' +
    '<div class="input-group"><label>Email</label><input type="email" id="newEmail" placeholder="john@email.com"/></div>' +
    '<div class="input-group"><label>Phone</label><input type="tel" id="newPhone" placeholder="0771234567"/></div>' +
    '<div class="input-group"><label>Sex</label><select id="newSex"><option value="M">Male</option><option value="F">Female</option></select></div>' +
    '<div class="input-group"><label>Temporary Password</label><input type="text" id="newPass" value="group2026"/></div>' +
    '<div class="modal-actions"><button class="btn btn-primary" onclick="saveNewMember()">Add Member</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>');
}

function saveNewMember() {
  var name = document.getElementById('newName').value.trim();
  var email = document.getElementById('newEmail').value.trim();
  var phone = document.getElementById('newPhone').value.trim();
  var sex = document.getElementById('newSex').value;
  var pass = document.getElementById('newPass').value;
  if (!name||!email||!phone) { showToast('Please fill all fields'); return; }
  var newId = Math.max.apply(null, appData.members.map(function(m){return m.id;})) + 1;
  var savings = {};
  MONTHS.forEach(function(mo){ savings[mo]=[0,0,0,0]; });
  appData.members.push({
    id:newId, name:name, firstName:name.split(' ')[0], sex:sex,
    contact:phone, email:email, password:pass, active:true,
    savings:savings, loans:[], points:0, pointHistory:[],
    joinDate:Date.now(), momoNumber:'', welcomeBonusGiven:false
  });
  saveData();
  closeModal();
  showToast('✅ ' + name + ' added!');
  navigateTo('members');
}

// ── EDIT MEMBER ───────────────────────────────────────────────────────────────
function showEditMemberModal(id) {
  var m = appData.members.find(function(x){return x.id===id;});
  if (!m) return;
  openModal('<div class="modal-title">✏️ Edit Member</div>' +
    '<div class="input-group"><label>Full Name</label><input type="text" id="eName" value="' + m.name + '"/></div>' +
    '<div class="input-group"><label>Email</label><input type="email" id="eEmail" value="' + m.email + '"/></div>' +
    '<div class="input-group"><label>Phone</label><input type="tel" id="ePhone" value="' + m.contact + '"/></div>' +
    '<div class="modal-actions"><button class="btn btn-primary" onclick="saveEditMember(' + id + ')">Save</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>');
}

function saveEditMember(id) {
  var m = appData.members.find(function(x){return x.id===id;});
  m.name = document.getElementById('eName').value.trim();
  m.email = document.getElementById('eEmail').value.trim();
  m.contact = document.getElementById('ePhone').value.trim();
  saveData(); closeModal(); showToast('Member updated!'); navigateTo('members');
}

function toggleMember(id) {
  var m = appData.members.find(function(x){return x.id===id;});
  m.active = !m.active;
  saveData(); navigateTo('members');
  showToast(m.active?'Member restored!':'Member removed.');
}

function confirmDeleteMember(id) {
  var m = appData.members.find(function(x){return x.id===id;});
  if (!m) return;
  if (!confirm('Permanently delete ' + m.name + '? This cannot be undone.')) return;
  appData.members = appData.members.filter(function(x){return x.id!==id;});
  saveData(); navigateTo('members');
  showToast(m.name + ' deleted.');
}

// ── UPDATE SAVINGS ────────────────────────────────────────────────────────────
function showUpdateSavingsModal() {
  var members = appData.members.filter(function(m){return m.active;});
  var mo = MONTHS[new Date().getMonth()];
  var week = Math.min(3, Math.floor((new Date().getDate()-1)/7));
  var rows = members.map(function(m){
    return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">' +
      '<span style="font-weight:500;">' + m.name + '</span>' +
      '<input type="number" id="sav-'+m.id+'" value="' + (m.savings[mo]&&m.savings[mo][week]||0) + '" style="width:130px;padding:8px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;text-align:right;outline:none;"/></div>';
  }).join('');
  openModal('<div class="modal-title">💰 Update Savings</div>' +
    '<div style="display:flex;gap:10px;margin-bottom:16px;">' +
    '<select id="savMonth" style="flex:1;padding:8px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none;">' +
    MONTHS.map(function(m,i){return '<option value="'+m+'"'+(m===mo?' selected':'')+'>'+m+'</option>';}).join('') + '</select>' +
    '<select id="savWeek" style="flex:1;padding:8px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);outline:none;">' +
    [0,1,2,3].map(function(w){return '<option value="'+w+'"'+(w===week?' selected':'')+'>Week '+(w+1)+'</option>';}).join('') + '</select></div>' +
    '<div style="max-height:300px;overflow-y:auto;">' + rows + '</div>' +
    '<div class="modal-actions"><button class="btn btn-primary" onclick="saveSavingsUpdate()">💾 Save</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>');
}

function saveSavingsUpdate() {
  var mo = document.getElementById('savMonth').value;
  var week = parseInt(document.getElementById('savWeek').value);
  appData.members.filter(function(m){return m.active;}).forEach(function(m){
    var el = document.getElementById('sav-'+m.id);
    if (el) { if (!m.savings[mo]) m.savings[mo]=[0,0,0,0]; m.savings[mo][week]=parseInt(el.value)||0; }
  });
  saveData(); closeModal(); showToast('✅ Savings updated!'); navigateTo('savings');
}

// ── DEPOSIT MODAL ─────────────────────────────────────────────────────────────
function showDepositModal() {
  var m = appData.members.find(function(x){return x.id===currentUser.memberId;});
  if (!m) return;
  var mo = MONTHS[new Date().getMonth()];
  var week = Math.min(3, Math.floor((new Date().getDate()-1)/7));
  openModal('<div class="modal-title">📱 Deposit via MoMo</div>' +
    '<div style="background:rgba(201,168,76,0.08);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px;color:var(--text-muted);">A MoMo prompt will be sent to your phone. Enter your PIN to complete.</div>' +
    '<div class="input-group"><label>Amount (UGX)</label><input type="number" id="depAmount" placeholder="e.g. 5000"/></div>' +
    '<div class="input-group"><label>Your MoMo Number</label><input type="tel" id="depPhone" value="' + (m.momoNumber||'0'+m.contact) + '"/></div>' +
    '<div class="input-group"><label>Month</label><select id="depMonth">' + MONTHS.map(function(mn){return '<option value="'+mn+'"'+(mn===mo?' selected':'')+'>'+mn+'</option>';}).join('') + '</select></div>' +
    '<div class="input-group"><label>Week</label><select id="depWeek">' + [0,1,2,3].map(function(w){return '<option value="'+w+'"'+(w===week?' selected':'')+'>Week '+(w+1)+'</option>';}).join('') + '</select></div>' +
    '<div class="modal-actions"><button class="btn btn-primary" onclick="processDeposit()">📱 Send MoMo Request</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>');
}

async function processDeposit() {
  var amount = parseInt(document.getElementById('depAmount').value);
  var phone = document.getElementById('depPhone').value.trim();
  var mo = document.getElementById('depMonth').value;
  var week = parseInt(document.getElementById('depWeek').value);
  var m = appData.members.find(function(x){return x.id===currentUser.memberId;});
  if (!amount||amount<=0) { showToast('Enter a valid amount'); return; }
  if (!phone||phone.length<10) { showToast('Enter a valid phone number'); return; }

  showToast('⏳ Sending MoMo request...');
  try {
    var res = await fetch(MOMO_BACKEND+'/pay/request', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({amount:amount,phone:phone,memberId:String(m.id),memberName:m.name,month:mo})
    });
    var data = await res.json();
    if (data.success) {
      if (!m.savings[mo]) m.savings[mo]=[0,0,0,0];
      m.savings[mo][week] += amount;
      m.momoNumber = phone;
      saveData(); closeModal();
      showToast('✅ MoMo prompt sent! Check your phone and enter your PIN.');
    } else {
      showToast('❌ Payment failed: ' + (data.error||'Unknown error'));
    }
  } catch(e) { showToast('❌ Could not reach payment server.'); }
}

// ── LOAN REQUEST ──────────────────────────────────────────────────────────────
function showLoanRequestModal() {
  var m = appData.members.find(function(x){return x.id===currentUser.memberId;});
  if (!m) return;
  var limit = getLoanLimit(m);
  if (limit <= 0) { showToast('You are not yet eligible for a loan.'); return; }
  openModal('<div class="modal-title">🏦 Request a Loan</div>' +
    '<div style="background:rgba(201,168,76,0.08);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px;color:var(--text-muted);">Your maximum loan amount: <strong style="color:var(--gold);">' + fmt(limit) + '</strong></div>' +
    '<div class="input-group"><label>Amount (UGX)</label><input type="number" id="loanAmt" placeholder="Enter amount" max="' + limit + '"/></div>' +
    '<div class="input-group"><label>Duration</label><select id="loanMonths"><option value="1">1 month</option><option value="2">2 months</option><option value="3">3 months</option></select></div>' +
    '<div class="input-group"><label>Reason (optional)</label><input type="text" id="loanReason" placeholder="e.g. Business capital"/></div>' +
    '<div class="modal-actions"><button class="btn btn-primary" onclick="submitLoanRequest()">Submit Request</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>');
}

function submitLoanRequest() {
  var amount = parseInt(document.getElementById('loanAmt').value);
  var months = parseInt(document.getElementById('loanMonths').value);
  var reason = document.getElementById('loanReason').value.trim();
  var m = appData.members.find(function(x){return x.id===currentUser.memberId;});
  var limit = getLoanLimit(m);
  if (!amount||amount<=0) { showToast('Enter a valid amount'); return; }
  if (amount > limit) { showToast('Amount exceeds your limit of ' + fmt(limit)); return; }
  if (!appData.loanRequests) appData.loanRequests = [];
  appData.loanRequests.push({ id: Date.now(), memberId:m.id, memberName:m.name, amount:amount, months:months, reason:reason, status:'pending', ts:Date.now() });
  saveData(); closeModal();
  showToast('✅ Loan request submitted! Admin will review shortly.');
}

// ── APPROVE/REJECT LOAN REQUEST ───────────────────────────────────────────────
function approveRequest(id) {
  var req = appData.loanRequests.find(function(r){return r.id===id;});
  if (!req) return;
  var m = appData.members.find(function(x){return x.id===req.memberId;});
  var tier = getPointTier(m);
  var issuedTs = Date.now();
  var dueDateTs = issuedTs + (req.months * 30 * 24 * 60 * 60 * 1000);
  var monthlyInterest = req.amount * tier.rate / 100;
  var monthlyPayment = Math.floor(req.amount/req.months) + monthlyInterest;
  if (!m.loans) m.loans = [];
  m.loans.push({ id:'L'+(appData.nextLoanId++), amount:req.amount, months:req.months, monthlyPayment:Math.round(monthlyPayment), interestRate:tier.rate, amountPaid:0, status:'active', issuedTs:issuedTs, dueDateTs:dueDateTs, lateFeePct:0 });
  req.status = 'approved';
  addNotification(m.id, '✅ Loan Approved!', 'Your loan of ' + fmt(req.amount) + ' has been approved at ' + tier.rate + '% interest rate.');
  saveData(); showToast('Loan approved for ' + m.name); navigateTo('loans');
}

function rejectRequest(id) {
  var req = appData.loanRequests.find(function(r){return r.id===id;});
  if (!req) return;
  req.status = 'rejected';
  addNotification(req.memberId, '❌ Loan Request Rejected', 'Your loan request of ' + fmt(req.amount) + ' was not approved. Contact the admin for details.');
  saveData(); showToast('Request rejected.'); navigateTo('loans');
}

// ── SEND CHAT ─────────────────────────────────────────────────────────────────
function sendChat() {
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text) return;
  var memberId = currentUser.memberId;
  if (!appData.chats) appData.chats = {};
  if (!appData.chats[memberId]) appData.chats[memberId] = [];
  appData.chats[memberId].push({ senderId:memberId, text:text, ts:Date.now() });
  input.value = '';
  saveData(); navigateTo('myChat');
}

// ── OPEN CHAT (ADMIN) ─────────────────────────────────────────────────────────
function openChat(memberId) {
  var m = appData.members.find(function(x){return x.id===memberId;});
  if (!m) return;
  var chats = (appData.chats&&appData.chats[memberId]) ? appData.chats[memberId] : [];
  var msgs = chats.map(function(msg){
    var isMine = msg.senderId !== memberId;
    return '<div><div style="font-size:11px;color:var(--text-muted);text-align:'+(isMine?'right':'left')+';margin-bottom:2px;">'+(isMine?'You':m.firstName)+' · '+timeAgo(msg.ts)+'</div>' +
      '<div class="chat-msg '+(isMine?'sent':'received')+'">'+msg.text+'</div></div>';
  }).join('');
  openModal('<div class="modal-title">💬 Chat — ' + m.name + '</div>' +
    '<div style="max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:12px;">' + (msgs||'<div style="text-align:center;color:var(--text-muted);padding:20px;">No messages yet</div>') + '</div>' +
    '<div style="display:flex;gap:8px;"><input type="text" id="adminChatInput" placeholder="Type a message..." style="flex:1;padding:10px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none;" onkeydown="if(event.key===\'Enter\')sendAdminChat('+memberId+')"/>' +
    '<button class="btn btn-primary" onclick="sendAdminChat('+memberId+')">Send</button></div>');
}

function sendAdminChat(memberId) {
  var input = document.getElementById('adminChatInput');
  var text = input.value.trim();
  if (!text) return;
  if (!appData.chats) appData.chats = {};
  if (!appData.chats[memberId]) appData.chats[memberId] = [];
  appData.chats[memberId].push({ senderId:currentUser.memberId||'admin', text:text, ts:Date.now() });
  addNotification(memberId, '💬 New message from Admin', text.substring(0,80));
  saveData(); openChat(memberId);
}

// ── POST ANNOUNCEMENT ─────────────────────────────────────────────────────────
function showPostAnnouncementModal() {
  openModal('<div class="modal-title">📢 Post Announcement</div>' +
    '<div class="input-group"><label>Title</label><input type="text" id="annTitle" placeholder="e.g. Monthly meeting reminder"/></div>' +
    '<div class="input-group"><label>Message</label><textarea id="annBody" rows="4" placeholder="Write your announcement..."></textarea></div>' +
    '<div class="modal-actions"><button class="btn btn-primary" onclick="saveAnnouncement()">Post</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>');
}

function saveAnnouncement() {
  var title = document.getElementById('annTitle').value.trim();
  var body = document.getElementById('annBody').value.trim();
  if (!title) { showToast('Enter a title'); return; }
  if (!appData.announcements) appData.announcements = [];
  appData.announcements.unshift({ id:Date.now(), title:title, body:body, ts:Date.now(), author:'Admin' });
  saveData(); closeModal(); showToast('✅ Announcement posted!'); navigateTo('announcements');
}

function deleteAnnouncement(id) {
  appData.announcements = (appData.announcements||[]).filter(function(a){return a.id!==id;});
  saveData(); showToast('Deleted.'); navigateTo('announcements');
}

// ── CHANGE PASSWORD ───────────────────────────────────────────────────────────
function showChangePasswordModal() {
  openModal('<div class="modal-title">🔑 Change Password</div>' +
    '<div class="input-group"><label>Current Password</label><input type="password" id="oldPass"/></div>' +
    '<div class="input-group"><label>New Password</label><input type="password" id="newPassInput"/></div>' +
    '<div class="input-group"><label>Confirm New Password</label><input type="password" id="confirmPassInput"/></div>' +
    '<div class="modal-actions"><button class="btn btn-primary" onclick="savePassword()">Save</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>');
}

function savePassword() {
  var m = appData.members.find(function(x){return x.id===currentUser.memberId;});
  if (!m) return;
  var old = document.getElementById('oldPass').value;
  var nw = document.getElementById('newPassInput').value;
  var conf = document.getElementById('confirmPassInput').value;
  if (old !== m.password) { showToast('Current password is incorrect'); return; }
  if (nw !== conf) { showToast('Passwords do not match'); return; }
  if (nw.length < 6) { showToast('Password must be at least 6 characters'); return; }
  m.password = nw;
  saveData(); closeModal(); showToast('✅ Password changed!');
}

// ── UPDATE MOMO ───────────────────────────────────────────────────────────────
function showUpdateMoMoModal() {
  var m = appData.members.find(function(x){return x.id===currentUser.memberId;});
  openModal('<div class="modal-title">📱 My MoMo Number</div>' +
    '<div style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">This number will be used for year-end payouts.</div>' +
    '<div class="input-group"><label>MTN MoMo Number</label><input type="tel" id="newMomo" value="'+(m.momoNumber||'0'+m.contact)+'"/></div>' +
    '<div class="modal-actions"><button class="btn btn-primary" onclick="saveMoMo()">Save</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>');
}

function saveMoMo() {
  var val = document.getElementById('newMomo').value.trim();
  if (!val||val.length<10) { showToast('Enter a valid MTN number'); return; }
  var m = appData.members.find(function(x){return x.id===currentUser.memberId;});
  m.momoNumber = val; saveData(); closeModal(); showToast('MoMo number updated!');
}

// ── ACTIVATE/DEACTIVATE ───────────────────────────────────────────────────────
function confirmActivate() {
  openModal('<div class="modal-title">🚀 Activate Loans & Points</div>' +
    '<p style="color:var(--text-muted);margin-bottom:16px;">This will give every member 100 welcome bonus points and unlock loans & points for all members.</p>' +
    '<div class="modal-actions"><button class="btn btn-primary" style="background:#22c55e;border:none;" onclick="doActivate()">Yes, Activate!</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>');
}

function doActivate() {
  appData.featuresActivated = true; appData.activationDate = Date.now();
  var ls = appData.loanSettings;
  appData.members.forEach(function(m) {
    if (!m.active||m.welcomeBonusGiven) return;
    var b = ls.welcomeBonus||100;
    m.points = (m.points||0) + b;
    m.pointHistory.unshift({ts:Date.now(),type:'earn',pts:b,reason:'Welcome bonus - Loans activated!'});
    m.welcomeBonusGiven = true;
    addNotification(m.id,'🚀 Loans & Points Live!','You received '+b+' welcome bonus points!');
  });
  saveData(); closeModal(); showToast('🎉 Activated!'); navigateTo('settings');
}

function confirmDeactivate() {
  openModal('<div class="modal-title">🔒 Deactivate?</div>' +
    '<p style="color:var(--text-muted);margin-bottom:16px;">This will wipe all points and hide loans from members. Data is preserved.</p>' +
    '<div class="modal-actions"><button class="btn btn-danger" onclick="doDeactivate()">Yes, Deactivate</button><button class="btn btn-outline" onclick="closeModal()">Cancel</button></div>');
}

function doDeactivate() {
  appData.featuresActivated = false; appData.activationDate = null;
  appData.members.forEach(function(m){ m.points=0; m.pointHistory=[]; m.welcomeBonusGiven=false; });
  saveData(); closeModal(); showToast('Deactivated.'); navigateTo('settings');
}

// ── SAVE GROUP SETTINGS ───────────────────────────────────────────────────────
async function saveGroupSettings() {
  var nameEl = document.getElementById('settGroupName');
  var emailEl = document.getElementById('settAdminEmail');
  var momoEl = document.getElementById('settMomo');
  if (!nameEl || !emailEl) { showToast('Could not find settings fields'); return; }

  var newName = nameEl.value.trim();
  var newEmail = emailEl.value.trim();
  var newMomo = momoEl ? momoEl.value.trim() : '';
  var passEl = document.getElementById('settAdminPass');
  var newPass = passEl ? passEl.value.trim() : '';

  if (!newName) { showToast('Group name cannot be empty'); return; }
  if (!newEmail) { showToast('Admin email cannot be empty'); return; }

  groupConfig.name = newName;
  groupConfig.adminEmail = newEmail;
  if (newMomo) groupConfig.momoNumber = newMomo;
  if (newPass && newPass.length >= 6) groupConfig.adminPassword = newPass;
  else if (newPass && newPass.length > 0) { showToast('Password must be at least 6 characters'); return; }

  try {
    await db.collection('aurora_groups').doc(groupId).set(groupConfig, {merge:true});
    showToast('✅ Settings saved!');
  } catch(e) {
    console.error('Save error:', e);
    showToast('✅ Settings saved locally!');
  }
  buildSidebar();
  document.title = groupConfig.name + ' — Aurora Vault';
}

function showForgotPassword() {
  openModal('<div class="modal-title">🔑 Forgot Password</div>' +
    '<p style="color:var(--text-muted);margin-bottom:16px;">Contact your group admin to reset your password.</p>' +
    '<div class="input-group"><label>Admin Email</label><div style="padding:10px;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--text-muted);">' + (groupConfig.adminEmail||'Contact your admin') + '</div></div>' +
    '<div class="modal-actions"><button class="btn btn-primary" onclick="closeModal()">OK</button></div>');
}
